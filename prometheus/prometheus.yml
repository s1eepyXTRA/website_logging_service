# ============================================================
# Конфигурация Prometheus — система мониторинга
#
# Prometheus периодически опрашивает (scrape) целевые сервисы
# и собирает их метрики в свою базу данных.
# ============================================================

global:
  # Как часто опрашивать метрики (по умолчанию)
  scrape_interval: 15s
  # Как часто пересчитывать правила алертов
  evaluation_interval: 15s

# Список целей для сбора метрик
scrape_configs:
  # Метрики самого Prometheus
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Метрики Vector (сборщик данных)
  # Vector экспортирует метрики на порту 9598
  - job_name: "vector"
    static_configs:
      - targets: ["vector:9598"]

  # Метрики Kafka (через JMX Exporter, если настроен)
  # Раскомментируйте, если добавите JMX exporter к Kafka
  # - job_name: "kafka"
  #   static_configs:
  #     - targets: ["kafka:7071"]
